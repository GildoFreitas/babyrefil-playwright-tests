# Run Playwright + pytest on push/PR. Tests hit the deployed app (BASE_URL).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    env:
      # Change here or set repository variable BASE_URL (Settings → Secrets and variables → Actions)
      BASE_URL: https://babyrefil.vercel.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright (${{ matrix.browser }} + system deps)
        run: playwright install ${{ matrix.browser }} --with-deps

      - name: Run E2E tests
        # Headless in CI; trace/video/screenshot only on failing tests (pytest-playwright)
        run: >-
          pytest -v --tb=short
          --browser=${{ matrix.browser }}
          --output=test-results
          --tracing=retain-on-failure
          --video=retain-on-failure
          --screenshot=only-on-failure
          --html=test-results/pytest-report.html
          --self-contained-html

      - name: Upload HTML report, traces, video, and screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ matrix.browser }}
          path: test-results/
          if-no-files-found: ignore
          retention-days: 14
